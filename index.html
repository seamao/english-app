<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Web3 English" />
  <title>Web3 商务英语 · Eason</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#4f46e5" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/custom.css" />
</head>
<body class="bg-neutral-50 text-neutral-900 antialiased">
  <div class="max-w-3xl mx-auto px-4 py-6">
    <header class="mb-4">
      <div class="flex items-center justify-between gap-3">
        <h1 class="text-lg font-bold tracking-tight">Web3 商务英语</h1>
        <div class="flex items-center gap-2">
          <label class="text-xs text-neutral-500">🎚️ 语速</label>
          <select id="global-speed" class="text-xs px-2 py-1 rounded-md border border-neutral-300 bg-white">
            <option value="0.5">0.5×</option>
            <option value="0.75">0.75×</option>
            <option value="0.9">0.9×</option>
            <option value="1" selected>1.0×</option>
            <option value="1.15">1.15×</option>
            <option value="1.3">1.3×</option>
            <option value="1.5">1.5×</option>
          </select>
        </div>
      </div>
    </header>

    <div id="hero-slot" class="mb-4"></div>

    <nav class="mb-6 overflow-x-auto">
      <div class="flex gap-2 min-w-max">
        <button data-tab="daily" onclick="switchTab('daily')" class="px-4 py-2 rounded-lg bg-neutral-900 text-white font-medium whitespace-nowrap">每日</button>
        <button data-tab="phrases" onclick="switchTab('phrases')" class="px-4 py-2 rounded-lg text-neutral-600 hover:bg-neutral-100 whitespace-nowrap">句型库</button>
        <button data-tab="scenarios" onclick="switchTab('scenarios')" class="px-4 py-2 rounded-lg text-neutral-600 hover:bg-neutral-100 whitespace-nowrap">场景对练</button>
        <button data-tab="pronunciation" onclick="switchTab('pronunciation')" class="px-4 py-2 rounded-lg text-neutral-600 hover:bg-neutral-100 whitespace-nowrap">发音</button>
        <button data-tab="chunks" onclick="switchTab('chunks')" class="px-4 py-2 rounded-lg text-neutral-600 hover:bg-neutral-100 whitespace-nowrap">词块库</button>
        <button data-tab="buglog" onclick="switchTab('buglog')" class="px-4 py-2 rounded-lg text-neutral-600 hover:bg-neutral-100 whitespace-nowrap">错题本</button>
        <button data-tab="feed" onclick="switchTab('feed')" class="px-4 py-2 rounded-lg text-neutral-600 hover:bg-neutral-100 whitespace-nowrap">实战素材</button>
        <button data-tab="settings" onclick="switchTab('settings')" class="px-4 py-2 rounded-lg text-neutral-600 hover:bg-neutral-100 whitespace-nowrap">设置</button>
      </div>
    </nav>

    <main id="tab-content"></main>

    <footer class="mt-12 pt-6 border-t border-neutral-200 text-center text-xs text-neutral-400">
      localStorage 存储 · 无后端 · 学习数据仅本机
    </footer>
  </div>

  <div id="playback-bar" class="hidden fixed bottom-4 left-1/2 -translate-x-1/2 z-40 bg-neutral-900 text-white rounded-full shadow-xl px-3 py-2 flex items-center gap-2">
    <span id="pb-status" class="text-xs px-2">▶ 播放中</span>
    <button id="pb-pause" class="w-9 h-9 rounded-full bg-neutral-700 hover:bg-neutral-600 flex items-center justify-center" title="暂停">⏸</button>
    <button id="pb-resume" class="w-9 h-9 rounded-full bg-indigo-600 hover:bg-indigo-500 flex items-center justify-center hidden" title="继续">▶</button>
    <button id="pb-stop" class="w-9 h-9 rounded-full bg-red-600 hover:bg-red-500 flex items-center justify-center" title="停止">⏹</button>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
